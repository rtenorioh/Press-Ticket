# Configuração temporária HTTP-only para obtenção dos certificados SSL
# Use este arquivo ANTES de obter os certificados Let's Encrypt
# Após obter os certificados, substitua por nginx.vps.conf

server {
    listen 80;
    server_name app.seudominio.com api.seudominio.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'Press Ticket - SSL initialization in progress';
        add_header Content-Type text/plain;
    }
}
