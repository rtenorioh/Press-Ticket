name: Create Release on Tag Push

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create_release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Validar formato da tag
        run: |
          if ! [[ "${GITHUB_REF#refs/tags/}" =~ ^v[0-9]+(\.[0-9]+){2}$ ]]; then
            echo "❌ Tag inválida. Use o formato vX.X.X (ex: v1.17.0)"
            exit 1
          fi

      - name: 🔖 Buscar tag anterior e gerar changelog
        id: changelog
        run: |
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"
          echo "Tag atual: $CURRENT_TAG"

          # Busca a tag imediatamente anterior à atual
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^${CURRENT_TAG}$" | head -1)
          echo "Tag anterior: $PREV_TAG"

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
          else
            RANGE="${CURRENT_TAG}"
          fi
          echo "Range: $RANGE"

          # Gera o log de commits no intervalo, sem merges
          LOG=$(git log "$RANGE" \
            --pretty=format:'- %s (%h)' \
            --abbrev-commit \
            --no-merges)

          if [ -z "$LOG" ]; then
            LOG="Nenhum commit registrado neste intervalo."
          fi

          echo "Commits:"
          echo "$LOG"

          # URL de comparação
          if [ -n "$PREV_TAG" ]; then
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${CURRENT_TAG}"
          else
            COMPARE_URL="https://github.com/${{ github.repository }}/releases/tag/${CURRENT_TAG}"
          fi
          echo "Compare: $COMPARE_URL"

          # Exporta outputs (heredoc para multiline)
          {
            echo "log<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          echo "prev_tag=$PREV_TAG"        >> $GITHUB_OUTPUT
          echo "current_tag=$CURRENT_TAG"  >> $GITHUB_OUTPUT
          echo "compare_url=$COMPARE_URL"  >> $GITHUB_OUTPUT

          # Data da tag anterior para busca de issues
          if [ -n "$PREV_TAG" ]; then
            PREV_DATE=$(git log -1 --format=%aI "$PREV_TAG")
          else
            PREV_DATE="2020-01-01T00:00:00Z"
          fi
          echo "prev_tag_date=$PREV_DATE" >> $GITHUB_OUTPUT

      - name: 📋 Listar issues fechadas
        id: issues
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GITHUB }}
        run: |
          ISSUES=$(gh issue list \
            --state closed \
            --search "closed:>${{ steps.changelog.outputs.prev_tag_date }}" \
            --json title,number \
            --jq '.[] | "- \(.title) (#\(.number))"' 2>/dev/null || echo "")

          if [ -z "$ISSUES" ]; then
            ISSUES="Nenhuma issue fechada neste período."
          fi

          echo "Issues:"
          echo "$ISSUES"

          {
            echo "list<<EOF"
            echo "$ISSUES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: 🚀 Criar Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN_GITHUB }}
        with:
          tag_name: ${{ steps.changelog.outputs.current_tag }}
          name: ${{ steps.changelog.outputs.current_tag }}
          body: |
            ## 🚀 O que mudou

            ${{ steps.changelog.outputs.log }}

            ---

            ## 🐛 Issues Fechadas

            ${{ steps.issues.outputs.list }}

            ---

            **🔍 Comparação completa:**
            [Ver alterações](${{ steps.changelog.outputs.compare_url }})
          draft: false
          prerelease: false
