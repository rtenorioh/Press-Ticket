name: Create Release on Tag Push

on:
  push:
    tags:
      - "v*"

jobs:
  create_release:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Necessário para criar releases

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # ✅ FIX 1: Busca TODO o histórico e tags anteriores

      # Validar que a tag segue o padrão semântico (vX.X.X)
      - name: 🏷️ Validar formato da tag
        run: |
          if ! [[ "${GITHUB_REF#refs/tags/}" =~ ^v[0-9]+(\.[0-9]+){2}$ ]]; then
            echo "❌ Tag inválida. Use o formato vX.X.X (ex: v1.17.0)"
            exit 1
          fi

      # ✅ FIX 2: GitHub CLI já vem no ubuntu-latest, autenticar via env var
      - name: 🔐 Autenticar GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GITHUB }}
        run: gh auth status # Só confirma que está autenticado

      # Pegar a tag anterior
      - name: 🔖 Buscar tag anterior
        id: prev_tag
        run: |
          previous_tag=$(git describe --tags $(git rev-list --tags --skip=1 --max-count=1) 2>/dev/null || echo "")
          echo "Tag anterior: $previous_tag"
          echo "previous_tag=$previous_tag" >> $GITHUB_OUTPUT

          # Pegar a data da tag anterior para filtrar issues
          if [ -n "$previous_tag" ]; then
            prev_date=$(git log -1 --format=%aI "$previous_tag")
          else
            prev_date="2020-01-01T00:00:00Z"
          fi
          echo "Data da tag anterior: $prev_date"
          echo "prev_tag_date=$prev_date" >> $GITHUB_OUTPUT   # ✅ FIX 3: variável agora existe

      # Listar issues fechadas desde a tag anterior
      - name: 📋 Listar issues fechadas
        id: list_closed_issues
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GITHUB }}
        run: |
          issues=$(gh issue list \
            --state closed \
            --search "closed:>${{ steps.prev_tag.outputs.prev_tag_date }}" \
            --json title,number \
            --jq '.[] | "- \(.title) (#\(.number))"' || echo "")

          if [ -z "$issues" ]; then
            issues="Nenhuma issue fechada neste período."
          fi

          echo "Issues encontradas:"
          echo "$issues"

          # ✅ FIX 4: sintaxe heredoc para outputs multiline
          {
            echo "issues<<EOF"
            echo "$issues"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # Gerar log de commits desde a tag anterior
      - name: 📝 Gerar log de commits
        id: commit_log
        run: |
          if [ -n "${{ steps.prev_tag.outputs.previous_tag }}" ]; then
            log=$(git log \
              --pretty=format:'- %s (%h)' \
              --abbrev-commit \
              ${{ steps.prev_tag.outputs.previous_tag }}..HEAD)
          else
            log=$(git log --pretty=format:'- %s (%h)' --abbrev-commit)
          fi

          if [ -z "$log" ]; then
            log="Nenhum commit registrado."
          fi

          echo "Commits encontrados:"
          echo "$log"

          # ✅ FIX 4: sintaxe heredoc para outputs multiline
          {
            echo "log<<EOF"
            echo "$log"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # Criar a release
      - name: 🚀 Criar Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN_GITHUB }}
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## 🚀 O que mudou

            ${{ steps.commit_log.outputs.log }}

            ---

            ## 🐛 Issues Fechadas

            ${{ steps.list_closed_issues.outputs.issues }}

            ---

            **🔍 Comparação completa:**
            [Ver alterações](https://github.com/${{ github.repository }}/compare/${{ steps.prev_tag.outputs.previous_tag }}...${{ github.ref_name }})
          draft: false
          prerelease: false
