name: Deploy — Press Ticket

on:
  push:
    branches: [main]

# Garante que apenas um deploy rode por vez
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — CI deve passar antes do deploy
  # ─────────────────────────────────────────
  ci:
    name: Verificação CI
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # ─────────────────────────────────────────
  # JOB 2 — Deploy na VPS via SSH
  # ─────────────────────────────────────────
  deploy:
    name: Deploy em Produção
    runs-on: ubuntu-latest
    needs: ci
    environment: production

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      # ── Notificação de início ────────────
      - name: 🚀 Iniciando deploy
        run: echo "Deploy iniciado para o commit ${{ github.sha }} por ${{ github.actor }}"

      # ── Conexão SSH e execução remota ────
      - name: 🔐 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true # Para tudo se algum comando falhar
          script: |
            set -e

            echo "📁 Acessando diretório do projeto..."
            cd ${{ secrets.APP_PATH }}

            echo "⬇️ Atualizando código da branch main..."
            git fetch origin main
            git reset --hard origin/main

            # ── BACKEND ────────────────────────────────────────
            echo "📦 Instalando dependências do backend..."
            cd backend
            npm ci --omit=dev

            echo "🏗️ Compilando TypeScript..."
            npm run build

            echo "🗄️ Executando migrações do banco de dados..."
            npx sequelize-cli db:migrate --env production

            echo "♻️ Reiniciando backend via PM2..."
            pm2 restart press-backend --update-env
            cd ..

            # ── FRONTEND ───────────────────────────────────────
            echo "📦 Instalando dependências do frontend..."
            cd frontend
            npm ci --omit=dev

            echo "🏗️ Gerando build do frontend..."
            REACT_APP_BACKEND_URL=${{ secrets.REACT_APP_BACKEND_URL }} npm run build

            echo "♻️ Reiniciando frontend via PM2..."
            pm2 restart press-frontend --update-env
            cd ..

            # ── DOCKER COMPOSE (se aplicável) ──────────────────
            # Descomente se usar Docker Compose em produção:
            # echo "🐳 Atualizando containers Docker..."
            # docker compose pull
            # docker compose up -d --build

            echo "💾 Salvando estado do PM2..."
            pm2 save

            echo "✅ Deploy concluído com sucesso!"

      # ── Verificação pós-deploy ────────────
      - name: 🏥 Verificar healthcheck
        run: |
          echo "Aguardando aplicação iniciar..."
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.BACKEND_URL }}/health || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Aplicação está saudável (HTTP $STATUS)"
          else
            echo "⚠️ Healthcheck retornou HTTP $STATUS — verifique os logs no PM2"
            exit 1
          fi

      # ── Sumário no GitHub ────────────────
      - name: 📋 Sumário do deploy
        if: always()
        run: |
          echo "## 🚀 Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Autor** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Data** | $(date '+%d/%m/%Y %H:%M:%S') UTC |" >> $GITHUB_STEP_SUMMARY
